<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
</head>
<body>
  <script>
    (function() {
      var path = window.location.pathname;
      if (path.includes('/clisonix-news/clisonix-news/')) {
        path = path.replace('/clisonix-news/clisonix-news/', '/');
      }
      if (path !== '/') {
        window.location.replace('https://news.clisonix.com' + path);
      } else {
        window.location.replace('https://news.clisonix.com/');
      }
    })();
  </script>
  <p>Redirecting to Clisonix News...</p>
</body>
</html>
